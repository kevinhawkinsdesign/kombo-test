<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://getkombo.ai/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Kombo 2.0</title>
    <script>
      // Self-heal for stale static hosting: GitHub Pages' CDN can serve a
      // cached index.html that points at a hashed bundle a later deploy
      // removed, which renders a blank page. If the app's script/stylesheet
      // fails to load, reload once with a cache-buster so the browser fetches
      // fresh HTML + assets. Guarded to run at most once until a load succeeds.
      (function () {
        window.addEventListener(
          "error",
          function (e) {
            var t = e && e.target
            if (!t || !t.tagName) return
            var tag = t.tagName.toUpperCase()
            var url = t.src || t.href || ""
            if ((tag !== "SCRIPT" && tag !== "LINK") || !/\/assets\//.test(url))
              return
            try {
              if (sessionStorage.getItem("kb-reloaded-once")) return
              sessionStorage.setItem("kb-reloaded-once", "1")
            } catch (_) {}
            var u = new URL(window.location.href)
            u.searchParams.set("cb", Date.now().toString(36))
            window.location.replace(u.toString())
          },
          true
        )
        window.addEventListener("load", function () {
          try {
            sessionStorage.removeItem("kb-reloaded-once")
          } catch (_) {}
        })
      })()
    </script>
    <script>
      // Auto-refresh on a new deploy. The publish step writes version.txt with
      // the current JS bundle hash; if the server's version differs from the one
      // this page loaded (e.g. a cached index.html is one deploy behind), reload
      // once to pick up the latest. Bounded to a single reload per version so it
      // can never loop, and only runs while the tab is visible.
      (function () {
        function loadedHash() {
          var s = document.querySelector('script[src*="/assets/index-"]')
          var m = s && s.src.match(/index-([A-Za-z0-9_-]+)\.js/)
          return m ? m[1] : null
        }
        function check() {
          if (document.visibilityState === "hidden") return
          fetch("version.txt?cb=" + Date.now(), { cache: "no-store" })
            .then(function (r) {
              return r.ok ? r.text() : null
            })
            .then(function (v) {
              if (!v) return
              v = v.trim()
              var cur = loadedHash()
              if (!cur || !v || v === cur) return
              try {
                if (sessionStorage.getItem("kb-version-reloaded") === v) return
                sessionStorage.setItem("kb-version-reloaded", v)
              } catch (_) {}
              window.location.reload()
            })
            .catch(function () {})
        }
        window.addEventListener("load", function () {
          window.setTimeout(check, 1500)
        })
        document.addEventListener("visibilitychange", function () {
          if (document.visibilityState === "visible") check()
        })
      })()
    </script>
    <script type="module" crossorigin src="./assets/index-BGgGGbMj.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CEi-0sUP.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
